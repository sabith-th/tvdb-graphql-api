}

enum KeyType {
  FANART
  POSTER
  SEASON
  SERIES
}

type Query {
  series(id: Int!): Series
  searchSeries(name: String!): [SeriesSearchResult]!
  seriesInfo(id: Int!): SeriesResponse
  episode(id: Int!): Episode
  seriesImages(
    id: Int!
    "Language e.g. eng, spa "
    lang: String
    "1 - Graphical Banner, 2 - Graphical Poster, 3 - Original Poster"
    type: Int
  ): [Artwork]
  seriesEpisodes(
    id: Int!
    season: Int
    episodeNumber: Int
    "airDate of the episode, format is yyyy-mm-dd"
    airDate: String
    "season-type: default, official, dvd, absolute. alternate or regional"
    seasonType: String
    page: Int
  ): [BasicEpisode]!
  movie(id: Int!): Movie
  movieBySlug(slug: String!): Movie
  searchMovies(name: String!): [MovieSearchResult]!
  season(id: Int!): Season
  person(id: Int!): Person
  list(id: Int!): List
  listBySlug(slug: String!): List
  seriesBySlug(slug: String!): Series
  filterSeries(
    country: String!
    lang: String!
    genre: Int
    year: Int
    company: Int
    status: Int
    "score | firstAired | lastAired | name"
    sort: String
    "asc | desc"
    sortType: String
    page: Int
  ): [Series]!
  award(id: Int!): Award
  awardCategory(id: Int!): AwardCategory
  company(id: Int!): Company
  character(id: Int!): Character
  seriesTranslation(id: Int!, language: String!): Translation
  movieTranslation(id: Int!, language: String!): Translation
  episodeTranslation(id: Int!, language: String!): Translation
  seasonTranslation(id: Int!, language: String!): Translation
  peopleTranslation(id: Int!, language: String!): Translation
  searchByRemoteId(remoteId: String!): [RemoteIdResult]!
  genres: [Genre]!
  genre(id: Int!): Genre
  languages: [Language]!
  countries: [Country]!
  contentRatings: [ContentRating]!
  updates(
    "Unix timestamp — return entities updated since this time"
    since: Int!
    type: String
    action: String
    page: Int
  ): [EntityUpdate]!
}

type Mutation {
  login(auth: Auth!): Token
}
